name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    environment: npm-medusa-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: yarn

      - run: corepack enable

      - name: Upgrade npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@11.5.1

      - run: yarn install --frozen-lockfile

      - run: yarn verify

      - name: Verify release tag, branch and candidate attestation
        id: release
        env:
          B2B_RELEASE_VALIDATION_TOKEN: ${{ secrets.B2B_RELEASE_VALIDATION_TOKEN }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          node ./scripts/verify-release-tag.mjs

      - name: Rebuild attested candidate archive
        env:
          CANDIDATE_COMMIT: ${{ steps.release.outputs.candidate_commit }}
          CANDIDATE_RAW_TARBALL: ${{ runner.temp }}/mantajs-medusa-dashboard-raw.tgz
          CANDIDATE_TARBALL: ${{ runner.temp }}/mantajs-medusa-dashboard-0.1.18-medusa.0.tgz
          CANDIDATE_WORKTREE: ${{ runner.temp }}/medusa-dashboard-candidate
        run: |
          git worktree add --detach "$CANDIDATE_WORKTREE" "$CANDIDATE_COMMIT"
          cd "$CANDIDATE_WORKTREE"
          git clean -ffdx
          yarn install --frozen-lockfile
          yarn build
          yarn pack --filename "$CANDIDATE_RAW_TARBALL"
          cd "$GITHUB_WORKSPACE"
          node ./scripts/prepare-release-candidate.mjs \
            "$CANDIDATE_RAW_TARBALL" \
            "$CANDIDATE_TARBALL"

      - name: Publish attested candidate archive
        env:
          CANDIDATE_TARBALL: ${{ runner.temp }}/mantajs-medusa-dashboard-0.1.18-medusa.0.tgz
        run: npm publish "$CANDIDATE_TARBALL" --tag medusa --provenance --access public
