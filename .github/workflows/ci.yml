name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dashboard-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: corepack enable

      - run: yarn install --frozen-lockfile

      - run: yarn verify
